<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>양일고등학교 2026 소나</title>
  <style>
    :root {
      --bg: #eef3f8;
      --bg-soft: #f7fafd;
      --panel: rgba(255, 255, 255, 0.92);
      --text: #1d2733;
      --muted: #6e7c89;
      --line: #d8e2ec;
      --accent: #4f7ea8;
      --accent-soft: #eaf2f9;
      --radius-xl: 28px;
      --radius-lg: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SUIT", "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
    }

    .wrap {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      padding: 40px 32px 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 0;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1.04;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 24px 0 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .section-head span {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 136px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #bfd0df;
      background: #fcfeff;
    }

    .card strong {
      display: block;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .card .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-all;
    }

    .card .action {
      margin-top: 16px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 1040px);
        padding-top: 20px;
      }

      .hero {
        padding: 32px 22px 24px;
      }

      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="eyebrow">Yangil High School</p>
      <h1>2026 소나</h1>
    </section>

    <section>
      <div class="section-head">
        <h2>학생 홈페이지</h2>
        <span id="countLabel">0</span>
      </div>
      <div id="memberGrid" class="grid"></div>
    </section>
  </div>

  <script src="members.js"></script>
  <script>
    const grid = document.getElementById("memberGrid");
    const countLabel = document.getElementById("countLabel");
    const members = Array.isArray(window.memberPages) ? window.memberPages : [];

    countLabel.textContent = String(members.length);

    if (!members.length) {
      grid.innerHTML = '<div class="empty">등록된 페이지가 없습니다.</div>';
    } else {
      grid.innerHTML = members.map((member) => `
        <a class="card" href="${member.href}">
          <div>
            <strong>${member.name}</strong>
            <div class="meta">${member.href}</div>
          </div>
          <div class="action">홈페이지 열기</div>
        </a>
      `).join("");
    }
  </script>
</body>
</html>
