<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 미니 쿠팡</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Shop</h1>
        <input type="text" placeholder="아이템을 검색하세요">
    </header>

    <main class="product-container">
        <div class="product-card">
            <div class="product-image">상품 이미지</div>
            <div class="product-info">
                <h3>맛있는 유기농 사과</h3>
                <p class="price">15,000원</p>
                <span class="delivery">내일(월) 새벽 도착 보장</span>
            </div>
        </div>
        <div class="product-card">
            <div class="product-image">상품 이미지</div>
            <div class="product-info">
                <h3>무선 블루투스 이어폰</h3>
                <p class="price">45,000원</p>
                <span class="delivery">로켓배송</span>
            </div>
        </div>
    </main>
</body>
</html>
<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    background-color: #f0f0f0;
}

header {
    background-color: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-bottom: 1px solid #ddd;
}

.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
}

.product-card {
    background-color: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-image {
    height: 200px;
    background-color: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
}

.product-info {
    padding: 15px;
}

.price {
    color: #ae0000;
    font-weight: bold;
    font-size: 1.2em;
}

.delivery {
    color: #00891a;
    font-size: 0.8em;
}
