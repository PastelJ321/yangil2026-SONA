<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 미식 가이드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍴 미식 가이드</h1>
        <p>내가 가본 최고의 맛집과 카페를 소개합니다.</p>
    </header>

    <main class="container">
        
        <div class="card">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=500');"></div>
            <div class="card-content">
                <span class="tag">#카페 #연남동</span>
                <h3>따뜻한 햇살 카페</h3>
                <p>통창으로 들어오는 햇살이 일품인 곳이에요. 시그니처 라떼를 꼭 드셔보세요!</p>
                <a href="#" class="btn">자세히 보기</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500');"></div>
            <div class="card-content">
                <span class="tag">#맛집 #이태원</span>
                <h3>화덕 피자의 진수</h3>
                <p>참나무 장작으로 구워낸 쫄깃한 도우가 환상적입니다. 예약은 필수!</p>
                <a href="#" class="btn">자세히 보기</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image" style="background-image: url('https://images.unsplash.com/photo-1559339352-11d035aa65de?w=500');"></div>
            <div class="card-content">
                <span class="tag">#베이커리 #성수동</span>
                <h3>빵순이들의 성지</h3>
                <p>매일 아침 9시에 나오는 크루아상이 정말 바삭해요. 주말에는 오픈런 추천!</p>
                <a href="#" class="btn">자세히 보기</a>
            </div>
        </div>

    </main>

    <footer>
        <p>© 2024 My Gourmet Guide. All rights reserved.</p>
    </footer>

</style></html>/* 기본 설정 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background-color: #f8f9fa;
    color: #333;
    line-height: 1.6;
}

/* 헤더 디자인 */
header {
    background-color: #ffffff;
    padding: 50px 20px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

header h1 {
    font-size: 2.5rem;
    color: #e67e22;
}

/* 카드 배치를 위한 컨테이너 */
.container {
    max-width: 1000px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    padding: 0 20px;
}

/* 카드 스타일 */
.card {
    background: #fff;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: translateY(-10px); /* 마우스 올리면 살짝 위로 */
}

/* 카드 이미지 영역 */
.card-image {
    height: 200px;
    background-size: cover;
    background-position: center;
}

/* 카드 내용 영역 */
.card-content {
    padding: 20px;
}

.tag {
    font-size: 0.8rem;
    color: #e67e22;
    font-weight: bold;
}

.card-content h3 {
    margin: 10px 0;
    font-size: 1.4rem;
}

.card-content p {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 20px;
}

/* 버튼 스타일 */
.btn {
    display: inline-block;
    text-decoration: none;
    background-color: #e67e22;
    color: #fff;
    padding: 8px 20px;
    border-radius: 5px;
    font-size: 0.9rem;
    transition: background 0.3s;
}

.btn:hover {
    background-color: #d35400;
}

/* 푸터 */
footer {
    text-align: center;
    padding: 40px;
    color: #888;
    font-size: 0.9rem;
}
