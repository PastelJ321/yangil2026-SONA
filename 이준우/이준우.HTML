<!DOCTYPE html>
<html lang="ko">
<head>

<body style="margin: 0; padding: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #fdfdfd; color: #333;">

    <header style="background: #ffffff; padding: 20px 0; border-bottom: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;">
            <h1 style="margin: 0; font-size: 24px; color: #ff6b00;">JUNWOO HOMEPAGE
            </h1>
            <nav>
                <ul style="list-style: none; margin: 0; padding: 0; display: flex; gap: 20px;">
                    <li><a href="#" style="text-decoration: none; color: #555; font-weight: bold;">홈</a></li>
                    <li><a href="#" style="text-decoration: none; color: #555; font-weight: bold;">서비스</a></li>
                    <li><a href="#" style="text-decoration: none; color: #555; font-weight: bold;">포트폴리오</a></li>
                    <li><a href="#" style="text-decoration: none; color: #555; font-weight: bold;">문의</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="background: linear-gradient(135deg, #ff9d5c 0%, #ff6b00 100%); padding: 80px 20px; text-align: center; color: white;">
        <div style="max-width: 1000px; margin: 0 auto;">
            <h2 style="font-size: 45px; margin-bottom: 20px; letter-spacing: -1px;">환영합니다!</h2>
            <p style="font-size: 20px; opacity: 0.9; margin-bottom: 30px;">살면서 처음으로 만든 멋진 첫 번째 페이지입니다.</p>
            <a href="#" style="display: inline-block; background: white; color: #ff6b00; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">더 알아보기</a>
        </div>
    </section>

    <section style="padding: 70px 20px;">
        <div style="max-width: 1000px; margin: 0 auto;">
            <h3 style="text-align: center; font-size: 30px; margin-bottom: 50px; position: relative; padding-bottom: 15px;">
                홈페이지의 특징
                <span style="position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50px; height: 3px; background: #ff6b00;"></span>
            </h3>
            
            <div style="display: flex; gap: 30px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 280px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #f0f0f0; transition: transform 0.3s;">
                    <h4 style="font-size: 22px; color: #ff6b00; margin-top: 0;">🏀 농구를 좋아함</h4>
                    <p style="color: #666; line-height: 1.6;">저는 농구를 좋아합니다.</p>
                </div>
                
                <div style="flex: 1; min-width: 280px; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #f0f0f0;">
                    <h4 style="font-size: 22px; color: #ff6b00; margin-top: 0;">🤝 친구들과 노는것도 좋아함</h4>
                    <p style="color: #666; line-height: 1.6;">친구들과 같이 노는걸 좋아합니다</p>
                </div>

    <footer style="text-align: center; padding: 40px; color: #aaa; font-size: 14px; border-top: 1px solid #eee;">
